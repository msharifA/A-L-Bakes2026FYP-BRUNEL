name: Build & Deploy Backend (EB + ECR)

on:
  push:
    branches: [ main ]
    paths:
      - "server/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  APP_NAME: albakes-backend
  ENV_NAME: albakes-backend-env
  ECR_REPO: albakes-backend
  EB_ARTIFACTS_BUCKET: albakes-eb-artifacts-eu-west-2-075120018831

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies & run tests
        working-directory: server
        run: |
          npm ci
          npm test

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::075120018831:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          docker build -t $ECR_REPO ./server

      - name: Tag & push image
        env:
          IMAGE_TAG: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          ECR_URI="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${IMAGE_TAG}"
          docker tag $ECR_REPO "$ECR_URI"
          docker push "$ECR_URI"

          VERSION_LABEL="backend-${IMAGE_TAG}-${RUN_ID}"

          echo "IMAGE_URI=$ECR_URI" >> "$GITHUB_ENV"
          echo "VERSION_LABEL=$VERSION_LABEL" >> "$GITHUB_ENV"

      - name: Render Dockerrun.aws.json
        run: |
          cat > Dockerrun.aws.json <<'JSON'
          {
            "AWSEBDockerrunVersion": 1,
            "Image": {
              "Name": "__IMAGE__",
              "Update": "true"
            },
            "Ports": [
              { "ContainerPort": "5000" }
            ]
          }
          JSON
          sed -i "s|__IMAGE__|${IMAGE_URI}|g" Dockerrun.aws.json

      - name: Package & upload EB app version
        run: |
          zip -q "app-${VERSION_LABEL}.zip" Dockerrun.aws.json
          aws s3 cp "app-${VERSION_LABEL}.zip" "s3://${{ env.EB_ARTIFACTS_BUCKET }}/"

      - name: Create EB application version
        run: |
          set -e

          echo "Checking if application version ${VERSION_LABEL} already exists..."

          EXISTING=$(
            aws elasticbeanstalk describe-application-versions \
              --application-name "${APP_NAME}" \
              --version-labels "${VERSION_LABEL}" \
              --query 'ApplicationVersions[0].VersionLabel' \
              --output text || true
          )

          if [ "$EXISTING" = "${VERSION_LABEL}" ]; then
            echo "Application version ${VERSION_LABEL} already exists. Skipping create."
          else
            echo "Creating new application version ${VERSION_LABEL}..."
            aws elasticbeanstalk create-application-version \
              --application-name "${APP_NAME}" \
              --version-label "${VERSION_LABEL}" \
              --source-bundle S3Bucket=${EB_ARTIFACTS_BUCKET},S3Key=app-${VERSION_LABEL}.zip
          fi

      - name: Update EB environment
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${{ env.ENV_NAME }}" \
            --version-label "${VERSION_LABEL}"